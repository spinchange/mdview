<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdview</title>
    <style id="mdview-theme-tokens"></style>
    <style>
      :root {
        color-scheme: light dark;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--mdv-bg, #1e1e1e);
        color: var(--mdv-text, #f3f3f3);
        font-family: "Segoe UI", "Inter", sans-serif;
      }

      #app {
        min-height: 100%;
        padding: 24px;
      }

      .mdv-defaults-panel,
      .mdv-toolbar,
      .mdv-editor,
      .mdv-toc {
        background: color-mix(in srgb, var(--mdv-surface, #252526) 92%, transparent);
        border: 1px solid var(--mdv-border, #3c3c3c);
        border-radius: 14px;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.18);
      }

      .mdv-defaults-panel {
        margin-bottom: 16px;
        padding: 12px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .mdv-defaults-panel__copy {
        margin: 0;
        font-size: 13px;
      }

      .mdv-workspace {
        display: grid;
        gap: 16px;
      }

      .mdv-toolbar {
        padding: 16px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .mdv-toolbar__title-group {
        display: grid;
        gap: 4px;
        min-width: 0;
      }

      .mdv-toolbar__title {
        margin: 0;
        font-size: 20px;
      }

      .mdv-toolbar__meta {
        margin: 0;
        font-size: 12px;
        opacity: 0.78;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mdv-toolbar__actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .mdv-button {
        appearance: none;
        border-radius: 10px;
        padding: 9px 13px;
        border: 1px solid var(--mdv-border, #3c3c3c);
        color: var(--mdv-text, #f3f3f3);
        background: transparent;
        cursor: pointer;
        font: inherit;
      }

      .mdv-button:hover:not(:disabled) {
        border-color: color-mix(in srgb, var(--mdv-accent, #0a84ff) 45%, var(--mdv-border, #3c3c3c));
      }

      .mdv-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .mdv-button--primary {
        background: color-mix(in srgb, var(--mdv-accent, #0a84ff) 18%, transparent);
        border-color: color-mix(in srgb, var(--mdv-accent, #0a84ff) 60%, var(--mdv-border, #3c3c3c));
      }

      .mdv-button--secondary {
        background: color-mix(in srgb, var(--mdv-bg, #1e1e1e) 82%, transparent);
      }

      .mdv-status-pill {
        border-radius: 999px;
        padding: 7px 11px;
        font-size: 12px;
        background: color-mix(in srgb, var(--mdv-bg, #1e1e1e) 72%, transparent);
        border: 1px solid var(--mdv-border, #3c3c3c);
      }

      .mdv-layout {
        display: grid;
        gap: 20px;
      }

      .mdv-layout--editing {
        grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
        align-items: start;
      }

      .mdv-viewer-host {
        min-width: 0;
      }

      .mdv-shell {
        display: grid;
        grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
        gap: 24px;
      }

      .mdv-toc {
        position: sticky;
        top: 16px;
        align-self: start;
        background: var(--mdv-surface, #252526);
        border: 1px solid var(--mdv-border, #3c3c3c);
        border-radius: 10px;
        padding: 12px;
      }

      .mdv-toc__title {
        margin: 0 0 10px;
        font-size: 14px;
        letter-spacing: 0.02em;
      }

      .mdv-toc__list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .mdv-toc__item + .mdv-toc__item {
        margin-top: 6px;
      }

      .mdv-toc__link {
        color: var(--mdv-text, #f3f3f3);
        text-decoration: none;
      }

      .mdv-toc__link:hover {
        color: var(--mdv-accent, #0a84ff);
      }

      .mdv-content {
        max-width: 860px;
        line-height: 1.65;
      }

      .mdv-content--jumpable h1,
      .mdv-content--jumpable h2,
      .mdv-content--jumpable h3,
      .mdv-content--jumpable h4,
      .mdv-content--jumpable h5,
      .mdv-content--jumpable h6 {
        cursor: pointer;
      }

      .mdv-content--jumpable h1:hover,
      .mdv-content--jumpable h2:hover,
      .mdv-content--jumpable h3:hover,
      .mdv-content--jumpable h4:hover,
      .mdv-content--jumpable h5:hover,
      .mdv-content--jumpable h6:hover {
        color: var(--mdv-accent, #0a84ff);
      }

      .mdv-content h1,
      .mdv-content h2,
      .mdv-content h3,
      .mdv-content h4,
      .mdv-content h5,
      .mdv-content h6 {
        scroll-margin-top: 16px;
      }

      .mdv-empty {
        opacity: 0.85;
        font-style: italic;
      }

      .mdv-editor {
        display: grid;
        gap: 12px;
        padding: 16px;
        min-height: 70vh;
      }

      .mdv-editor__header {
        display: grid;
        gap: 4px;
      }

      .mdv-editor__title {
        font-weight: 600;
      }

      .mdv-editor__hint,
      .mdv-editor__message {
        margin: 0;
        font-size: 12px;
        opacity: 0.8;
      }

      .mdv-editor__surface {
        min-height: 58vh;
        border-radius: 12px;
        border: 1px solid var(--mdv-border, #3c3c3c);
        background: color-mix(in srgb, var(--mdv-bg, #1e1e1e) 82%, black 10%);
        color: var(--mdv-text, #f3f3f3);
        overflow: hidden;
      }

      .mdv-search {
        display: grid;
        gap: 10px;
        padding: 12px;
        border-radius: 12px;
        background: color-mix(in srgb, var(--mdv-bg, #1e1e1e) 76%, transparent);
        border: 1px solid var(--mdv-border, #3c3c3c);
      }

      .mdv-search__fields,
      .mdv-search__actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .mdv-search__input {
        min-width: 180px;
        flex: 1 1 220px;
        border-radius: 10px;
        border: 1px solid var(--mdv-border, #3c3c3c);
        background: color-mix(in srgb, var(--mdv-bg, #1e1e1e) 86%, black 8%);
        color: var(--mdv-text, #f3f3f3);
        padding: 9px 11px;
        font: inherit;
      }

      .mdv-search__summary {
        margin: 0;
        font-size: 12px;
        opacity: 0.78;
      }

      @media (max-width: 900px) {
        #app {
          padding: 16px;
        }

        .mdv-defaults-panel,
        .mdv-toolbar {
          padding: 14px;
        }

        .mdv-layout--editing,
        .mdv-shell {
          grid-template-columns: 1fr;
        }

        .mdv-toc {
          position: static;
        }

        .mdv-toolbar {
          align-items: start;
          flex-direction: column;
        }

        .mdv-toolbar__actions {
          width: 100%;
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main id="app">mdview bootstrap</main>
    <script src="./app.js"></script>
  </body>
</html>
